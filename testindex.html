<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Boarding Pass">
<meta name="theme-color" content="#0D1B2A">
<link rel="manifest" href="manifest.json">
<title>Mon Boarding Pass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="shortcut icon" type="image/png" href="favico.ico"/>
<link rel="apple-touch-icon" href="apple-icn.jpg">
<link rel="apple-touch-icon" sizes="152x152" href="apple-icn.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-icn.jpg">
<link rel="apple-touch-icon" sizes="167x167" href="apple-icn.jpg">

<style>
:root {
  --navy:#0D1B2A;
  --navy-mid:#162236;
  --navy-light:#1E3250;
  --accent:#5BC8F5;
  --accent-dim:#2A8BB5;
  --tp:#FFFFFF;
  --ts:#8BAFC8;
  --tm:#4A6680;
  --bd:rgba(91,200,245,0.15);
  --bs:rgba(91,200,245,0.3);
  --fn:'Raleway',sans-serif;
  --fm:'Nunito Sans',sans-serif;
  --r:12px; --rs:8px;
  --tab-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body { background:#0A1520; color:var(--tp); font-family:var(--fn); }

/* ════════════════════════════════
   DESKTOP LAYOUT (≥900px)
════════════════════════════════ */
@media(min-width:900px) {
  .mobile-only { display:none !important; }
  .desktop-app {
    display:grid; grid-template-columns:1fr 1fr; height:100vh;
  }
}
@media(max-width:899px) {
  .desktop-only { display:none !important; }
  .desktop-app { display:none !important; }
}

/* ── EDITOR PANEL (desktop) ── */
.editor-panel {
  background:var(--navy-mid);
  border-right:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.panel-header {
  padding:22px 28px 18px;
  border-bottom:1px solid var(--bd);
  display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.panel-header h1 { font-size:16px; font-weight:600; }
.panel-header span { font-size:13px; color:var(--tm); font-weight:400; }
.editor-scroll {
  flex:1; overflow-y:auto; padding:24px 28px;
  display:flex; flex-direction:column; gap:26px;
}
.editor-scroll::-webkit-scrollbar { width:3px; }
.editor-scroll::-webkit-scrollbar-thumb { background:var(--tm); border-radius:2px; }

/* ── PREVIEW PANEL (desktop) ── */
.preview-panel {
  background:#080F18;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 24px; gap:20px;
}
.preview-label {
  font-size:10px; font-weight:500; letter-spacing:.1em;
  text-transform:uppercase; color:var(--tm);
}
.phone-frame {
  width:300px; background:#1A1A1A; border-radius:44px; padding:12px;
  box-shadow:0 0 0 1.5px #333, 0 0 0 3px #1A1A1A, 0 40px 80px rgba(0,0,0,.7);
}
.phone-screen { background:#000; border-radius:36px; overflow:hidden; position:relative; }
.phone-notch {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:80px; height:22px; background:#1A1A1A;
  border-radius:0 0 14px 14px; z-index:10;
}

/* ════════════════════════════════
   SHARED FORM STYLES
════════════════════════════════ */
.sec-title {
  font-size:10px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--accent); margin-bottom:12px;
}
.fg { display:flex; flex-direction:column; gap:10px; }
.fr { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.f { display:flex; flex-direction:column; gap:5px; }
.f label { font-size:11px; font-weight:500; color:var(--ts); letter-spacing:.03em; }
.f input, .f select {
  background:var(--navy); border:1px solid var(--bd); border-radius:var(--rs);
  color:var(--tp); font-family:var(--fm); font-size:16px;
  padding:10px 12px; outline:none; transition:border-color .2s; width:100%;
  -webkit-appearance:none;
}
.f input:focus, .f select:focus { border-color:var(--accent-dim); }
select option { background:var(--navy); }

/* QR upload */
.qr-zone {
  background:var(--navy); border:1.5px dashed var(--bs);
  border-radius:var(--r); padding:22px 20px; text-align:center;
  cursor:pointer; transition:all .2s; position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
.qr-zone.has-img { border-style:solid; border-color:var(--accent-dim); padding:12px; }
.qr-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.qr-zone p { font-size:13px; color:var(--ts); }
.qr-zone small { font-size:11px; color:var(--tm); }
.qr-thumb { width:100px; height:100px; object-fit:contain; border-radius:6px; display:none; }
.qr-zone.has-img .qr-thumb { display:block; }
.qr-zone.has-img .qz-ph { display:none; }

/* Logo */
.logo-row { display:flex; align-items:center; gap:10px; }
.logo-zone {
  background:var(--navy); border:1px dashed var(--bs);
  border-radius:var(--rs); padding:12px 14px; cursor:pointer;
  display:flex; align-items:center; gap:10px;
  position:relative; transition:border-color .2s; flex:1;
}
.logo-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.logo-thumb { width:32px; height:32px; object-fit:contain; border-radius:4px; display:none; }
.logo-zone.has-logo .logo-thumb { display:block; }
.logo-zt { font-size:12px; color:var(--ts); }
.logo-remove {
  background:rgba(255,80,80,.12); border:1px solid rgba(255,80,80,.25);
  border-radius:var(--rs); color:#ff6b6b; font-family:var(--fn);
  font-size:12px; font-weight:600; padding:10px 14px;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  display:none; transition:background .2s;
}
.logo-remove:hover { background:rgba(255,80,80,.22); }

/* Color picker — trigger + popover */
.color-picker-wrap { position:relative; }
.palette-field { display:flex; flex-direction:column; gap:6px; }
.palette-field label { font-size:11px; font-weight:500; color:var(--ts); letter-spacing:.03em; }
.color-trigger {
  background:var(--navy); border:1px solid var(--bd); border-radius:var(--rs);
  padding:9px 12px; cursor:pointer; display:flex; align-items:center; gap:10px;
  transition:border-color .2s; user-select:none; -webkit-tap-highlight-color:transparent;
}
.color-trigger:hover, .color-trigger.open { border-color:var(--bs); }
.ct-swatch {
  width:22px; height:22px; border-radius:4px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.15);
}
.ct-name { font-size:13px; color:var(--ts); flex:1; }
.ct-arrow { color:var(--tm); font-size:10px; transition:transform .2s; line-height:1; }
.color-trigger.open .ct-arrow { transform:rotate(180deg); }
.color-popover {
  display:none; position:absolute; left:0; right:0; top:calc(100% + 6px);
  z-index:300; background:#0D1B2A; border:1px solid var(--bs);
  border-radius:var(--r); padding:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
}
.color-popover.open { display:block; }
.color-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
.color-swatch {
  width:100%; aspect-ratio:1; border-radius:5px; cursor:pointer;
  border:2px solid transparent; transition:transform .12s, border-color .12s; position:relative;
}
.color-swatch:hover { transform:scale(1.15); z-index:1; }
.color-swatch.selected { border-color:#fff; }
.color-swatch.selected::after {
  content:'✓'; position:absolute; inset:0; display:flex;
  align-items:center; justify-content:center;
  font-size:12px; color:rgba(255,255,255,.9);
  text-shadow:0 1px 3px rgba(0,0,0,.8);
}

/* Save button */
.save-btn {
  background:var(--accent); color:var(--navy);
  border:none; border-radius:var(--r);
  font-family:var(--fn); font-size:15px; font-weight:700;
  padding:15px; cursor:pointer; width:100%; transition:all .2s;
}
.save-btn:hover { background:#7dd8f9; }
.save-btn:active { transform:scale(.98); }

/* Scan hint */
.scan-hint {
  font-size:11px; color:var(--tm);
  display:flex; align-items:center; gap:6px; font-family:var(--fm);
}
.sdot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ════════════════════════════════
   WALLET PASS (shared)
════════════════════════════════ */
.wallet-pass {
  width:100%;
  padding:30px 18px 24px;
  display:flex; flex-direction:column;
  position:relative; user-select:none;
  transition:filter .3s;
}
/* desktop needs min-height inside phone frame */
.phone-screen .wallet-pass { min-height:540px; cursor:pointer; }

.pass-sep { border:none; border-top:1px dashed rgba(255,255,255,.12); margin:12px 0; }
.pass-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:18px; margin-top:8px; text-transform: capitalize;
}
.pass-logo-area { display:flex; align-items:center; gap:8px; }
.pass-logo-img { height:26px; max-width:90px; object-fit:contain; border-radius:2px; }
.pass-logo-text { font-size:13px; font-weight:700; letter-spacing:-.01em; }
.pass-date-block { text-align:right; }
.flabel {
  font-size:8.5px; font-weight:700; letter-spacing:.09em;
  text-transform:uppercase; display:block; margin-bottom:2px;
}
.fval { display:block; }
.flg { font-size:19px; font-weight:700; font-family:var(--fm); }
.fmd { font-size:12px; font-family:var(--fm); }
.fname { font-size:14px; font-weight:600; letter-spacing:.02em; }
.fsm { font-size:12px; font-weight:600; }
.stations-row {
  display:grid; grid-template-columns:1fr 44px 1fr;
  align-items:center; gap:4px; margin-bottom:4px; min-height:52px; text-transform: uppercase;
}
.sname { font-size:12px; font-weight:600; line-height:1.25; word-break:break-word; }
.sname.right { text-align:right; }
.train-icon-cell { display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.times-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; align-items:start; }
.tc { text-align:center; } .tr { text-align:right; }
.pax-row { display:grid; grid-template-columns:1fr 1fr; gap:8px;text-transform: uppercase; }
.extra-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;text-transform: capitalize; }
.qr-section { display:flex; justify-content:center; margin-top:auto; padding-top:8px; }
.qr-box {
  background:white; border-radius:10px; padding:10px;
  width:170px; height:170px;
  display:flex; align-items:center; justify-content:center;
}
.qr-box img { width:100%; height:100%; object-fit:contain; }
.qr-ph { display:flex; flex-direction:column; align-items:center; gap:5px; }
.qr-ph span { font-size:9px; color:#999; text-align:center; }

/* ════════════════════════════════
   MOBILE APP
════════════════════════════════ */
.mobile-app {
  display:flex; flex-direction:column;
  height:100vh; height:100dvh;
  position:relative; overflow:hidden;
}

/* Tab bar */
.tab-bar {
  position:absolute; bottom:0; left:0; right:0;
  height:calc(var(--tab-h) + var(--safe-b));
  background:rgba(13,27,42,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  display:flex; align-items:flex-start; justify-content:space-around;
  padding-top:8px;
  z-index:100;
  flex-shrink:0;
}
.tab-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; cursor:pointer;
  padding:4px 20px;
  color:var(--tm); font-family:var(--fn);
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn.active { color:var(--accent); }
.tab-btn svg { transition:transform .2s; }
.tab-btn.active svg { transform:scale(1.08); }
.tab-btn span { font-size:10px; font-weight:600; letter-spacing:.03em; }

/* Tab btn: add pass */
.tab-btn-add {
  background:var(--accent); color:var(--navy) !important;
  border-radius:50%; width:48px; height:48px;
  display:flex; align-items:center; justify-content:center;
  border:none; cursor:pointer; margin-top:-10px;
  box-shadow:0 4px 16px rgba(91,200,245,.4);
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}

/* Views container */
.views {
  flex:1;
  overflow:hidden;
  padding-bottom:calc(var(--tab-h) + var(--safe-b));
  position:relative;
}

/* Each view */
.view {
  position:absolute; inset:0;
  display:none; flex-direction:column;
  overflow:hidden;
}
.view.active { display:flex; }

/* ── VIEW: WALLET (mes pass) ── */
#viewWallet {
  background:#080F18;
  align-items:center;
}

.wallet-topbar {
  width:100%; padding:16px 20px 8px;
  padding-top:calc(16px + env(safe-area-inset-top,0px));
  flex-shrink:0;
}
.wallet-topbar h2 { font-size:20px; font-weight:700; letter-spacing:-.02em; }
.wallet-topbar p { font-size:12px; color:var(--tm); margin-top:2px; }

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; padding:40px 32px; text-align:center;
}
.empty-state svg { opacity:.3; }
.empty-state h3 { font-size:18px; font-weight:600; }
.empty-state p { font-size:14px; color:var(--tm); line-height:1.6; }
.empty-cta {
  background:var(--accent); color:var(--navy);
  border:none; border-radius:50px;
  font-family:var(--fn); font-size:14px; font-weight:700;
  padding:14px 32px; cursor:pointer; margin-top:4px;
  -webkit-tap-highlight-color:transparent;
}

/* Stack de pass style Apple Wallet */
.passes-stack {
  flex:1; width:100%;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 20px 20px;
}
.passes-stack::-webkit-scrollbar { display:none; }

.stack-inner {
  position:relative; width:100%;
  /* height set dynamically */
}
.pass-card-wrap {
  position:absolute; left:0; right:0;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.pass-card-wrap .wallet-pass {
  border-radius:20px;
  box-shadow:0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
  overflow:hidden;
}
/* Collapsed: show only top strip */
.pass-card-wrap.collapsed .wallet-pass {
  overflow:hidden;
}
/* Active (expanded to top): full card visible */

/* Delete badge */
.pass-delete-btn {
  position:absolute; top:8px; right:8px; z-index:10;
  background:rgba(255,60,60,.85); color:#fff;
  border:none; border-radius:50%; width:26px; height:26px;
  font-size:14px; cursor:pointer; display:none;
  align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.pass-card-wrap.edit-mode .pass-delete-btn { display:flex; }
.pass-card-wrap.edit-mode .wallet-pass { opacity:.85; }

.stack-hint {
  position:absolute; bottom:12px; left:0; right:0;
  text-align:center; font-size:11px; color:var(--tm);
  font-family:var(--fm); pointer-events:none;
}

/* Manage bar */
.manage-bar {
  width:100%; padding:8px 20px 4px;
  display:flex; justify-content:flex-end; flex-shrink:0;
}
.manage-btn {
  background:none; border:none; color:var(--accent);
  font-family:var(--fn); font-size:13px; font-weight:600;
  cursor:pointer; padding:4px 8px;
  -webkit-tap-highlight-color:transparent;
}

/* ── VIEW: EDITOR (créer/éditer) ── */
#viewEditor {
  background:var(--navy-mid);
}
.editor-mob-header {
  padding:16px 20px 14px;
  padding-top:calc(16px + env(safe-area-inset-top,0px));
  border-bottom:1px solid var(--bd);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.editor-mob-header h2 { font-size:17px; font-weight:700; }
.header-pass-count {
  font-size:12px; color:var(--tm); font-weight:500;
}
.editor-mob-scroll {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:20px 20px calc(24px + var(--tab-h) + var(--safe-b));
  display:flex; flex-direction:column; gap:22px;
}
.editor-mob-scroll::-webkit-scrollbar { display:none; }

/* ── FULLSCREEN SCAN OVERLAY ── */
#scanOverlay {
  position:fixed; inset:0; z-index:500;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000;
  padding-top:calc(env(safe-area-inset-top,0px) + 20px);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
}
#scanOverlay.active { display:flex; }
#scanOverlay .wallet-pass {
  width:calc(100% - 32px); max-width:420px;
  border-radius:20px;
  box-shadow:0 24px 80px rgba(0,0,0,.8);
  transition:filter .3s;
  overflow:hidden;
}
#scanOverlay .wallet-pass.scanning { filter:brightness(1.9) saturate(.3); }
.scan-overlay-hint {
  margin-top:20px; font-size:12px; color:rgba(255,255,255,.4);
  font-family:var(--fm); display:flex; align-items:center; gap:8px;
}
.scan-close {
  position:absolute; top:calc(16px + env(safe-area-inset-top,0px)); right:20px;
  background:rgba(255,255,255,.1); border:none; border-radius:50%;
  width:36px; height:36px; color:#fff; font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════
   DATE PICKER POPOVER
════════════════════════════════ */
.date-trigger, .time-trigger {
  background:var(--navy); border:1px solid var(--bd); border-radius:var(--rs);
  color:var(--tp); font-family:var(--fn); font-size:16px;
  padding:10px 12px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  width:100%; transition:border-color .2s; user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.date-trigger:hover, .date-trigger.open,
.time-trigger:hover, .time-trigger.open { border-color:var(--accent-dim); }
.dt-value { flex:1; }
.dt-icon { color:var(--tm); font-size:14px; flex-shrink:0;height: 20px; }
.picker-wrap { position:relative; }
.picker-popover {
  display:none; position:absolute; left:0; right:0; top:calc(100% + 6px);
  z-index:400; background:#0D1B2A; border:1px solid var(--bs);
  border-radius:var(--r); padding:16px;
  box-shadow:0 16px 48px rgba(0,0,0,.8);
  min-width:280px;
}
.picker-popover.open { display:block; }
.picker-popover.pop-right {
  left: auto;
  right: 0;
}

/* Calendar */
.cal-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.cal-nav {
  background:none; border:none; color:var(--accent); font-size:18px;
  cursor:pointer; padding:4px 8px; border-radius:6px; line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.cal-nav:hover { background:rgba(91,200,245,.1); }
.cal-month-label { font-size:13px; font-weight:700; color:var(--tp); }
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:2px;
}
.cal-day-name {
  font-size:9px; font-weight:700; text-align:center;
  color:var(--tm); padding:4px 0; letter-spacing:.05em;
}
.cal-day {
  font-size:12px; text-align:center; padding:6px 2px;
  border-radius:6px; cursor:pointer; color:var(--tp);
  transition:background .12s, color .12s;
  -webkit-tap-highlight-color:transparent;
}
.cal-day:hover { background:rgba(91,200,245,.15); }
.cal-day.other-month { color:var(--tm); }
.cal-day.today { color:var(--accent); font-weight:700; }
.cal-day.selected { background:var(--accent); color:var(--navy); font-weight:700; }
.cal-day.empty { cursor:default; }

/* Time drum / wheel picker */
.time-drums {
  display:flex; align-items:center; justify-content:center; gap:0;
}
.drum-wrap {
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.drum-label {
  font-size:9px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--tm);
}
.drum {
  width:72px; height:160px; overflow:hidden;
  position:relative; cursor:grab;
  -webkit-tap-highlight-color:transparent;
}
.drum:active { cursor:grabbing; }
.drum-inner {
  display:flex; flex-direction:column;
  transition:transform .18s cubic-bezier(.25,.46,.45,.94);
}
.drum-item {
  height:40px; display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:22px; font-weight:700;
  color:var(--tm); transition:color .12s, transform .12s;
  flex-shrink:0;
}
.drum-item.active {
  color:var(--tp); transform:scale(1.15);
}
.drum-separator {
  font-family:var(--fm); font-size:28px; font-weight:700;
  color:var(--accent); align-self:center; padding:0 2px; margin-bottom:20px;
}
/* Selection highlight band */
.drum::before, .drum::after {
  content:''; position:absolute; left:0; right:0; z-index:2; pointer-events:none;
}
.drum::before {
  top:0; height:60px;
  background:linear-gradient(to bottom, #0D1B2A, transparent);
}
.drum::after {
  bottom:0; height:60px;
  background:linear-gradient(to top, #0D1B2A, transparent);
}
.drum-highlight {
  position:absolute; top:50%; left:4px; right:4px;
  height:40px; transform:translateY(-50%);
  border:1px solid var(--bs); border-radius:8px;
  background:rgba(91,200,245,.08); pointer-events:none; z-index:1;
}
.time-confirm {
  margin-top:14px; width:100%;
  background:var(--accent); color:var(--navy);
  border:none; border-radius:var(--rs);
  font-family:var(--fn); font-size:14px; font-weight:700;
  padding:10px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════
   ANIMATIONS
════════════════════════════════ */
/* Tab switch fade */
.view {
  transition:opacity .22s ease, transform .22s cubic-bezier(.4,0,.2,1);
}
.view:not(.active) { opacity:0; transform:translateY(6px); pointer-events:none; }
.view.active { opacity:1; transform:translateY(0); }

/* Scan overlay entrance */
#scanOverlay {
  transition:opacity .28s ease;
  opacity:0;
}
#scanOverlay.active { opacity:1; }
#scanOverlay .wallet-pass {
  transition:filter .3s, transform .3s cubic-bezier(.34,1.2,.64,1);
  transform:scale(.96) translateY(12px);
}
#scanOverlay.active .wallet-pass { transform:scale(1) translateY(0); }

/* Pass card tap feedback */
.pass-card-wrap {
  transition:top .4s cubic-bezier(.34,1.2,.64,1), transform .15s ease, opacity .3s;
}
.pass-card-wrap:active { transform:scale(.985); }

/* Save button success pulse */
@keyframes successPulse {
  0%   { box-shadow:0 0 0 0 rgba(91,200,245,.5); }
  70%  { box-shadow:0 0 0 10px rgba(91,200,245,0); }
  100% { box-shadow:0 0 0 0 rgba(91,200,245,0); }
}
.save-btn.success { animation:successPulse .6s ease; }

/* Stack card entrance */
@keyframes cardSlideIn {
  from { opacity:0; transform:translateY(-16px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.pass-card-wrap { animation:cardSlideIn .3s ease both; }

</style>

function passHTML(p, opts={}) {
  const a = p.selAccent, t = p.selText;
  const tl = p.trainType === 'custom' ? (p.customTrain || '—') : p.trainType;
  const extras = [];
  if(p.carriage)  extras.push({l:'VOITURE', val:p.carriage});
  if(p.seat)      extras.push({l:'SIÈGE',   val:p.seat});
  if(p.classType) extras.push({l:'CLASSE',  val:p.classType});
  if(p.tariff)    extras.push({l:'TARIF',   val:p.tariff});
  const extraH = extras.length ? `<div class="extra-row">${
    extras.slice(0,2).map((x,i) => `<div${i?' style="text-align:right"':''}>
      <span class="flabel" style="color:${a}${i?';text-align:right':''}">${x.l}</span>
      <span class="fsm fval" style="color:${t}${i?';display:block;text-align:right':''}">${x.val}</span>
    </div>`).join('')
  }</div>` : '';

  const logoH = p.logoSrc
    ? `<img class="pass-logo-img" src="${p.logoSrc}" alt="">`
    : `<span class="pass-logo-text" style="color:${t}">${p.carrier || 'Transporteur'}</span>`;

  const qrH = p.qrSrc
    ? `<img src="${p.qrSrc}" style="width:100%;height:100%;object-fit:contain;">`
    : `<div class="qr-ph">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">

          <rect x="46" y="46" width="6" height="6" fill="#aaa" opacity=".4"/>

        <span>QR à importer</span>

  const sepStyle = `border-top-color:${a}30`;

    </div>
    <div style="display:grid;grid-template-columns:1fr 44px 1fr;gap:4px;margin-bottom:4px;">

    </div>
    <div class="stations-row">

function buildGridsFor(cid) {
  // Attach trigger click listeners (plus fiable que onclick inline dans innerHTML)
  ['Bg','Accent','Text'].forEach(key => {
    const trig = document.getElementById('trig'+key+'_'+cid);
    if(trig) trig.addEventListener('click', () => togglePopover(key, cid));
  });

  ['Bg','Accent','Text'].forEach(key => {
    const lk = key.toLowerCase();
    const selKey = 'sel'+key;
    const grid = document.getElementById('grid'+key+'_'+cid);
    if(!grid) return;
    const sel = editorState[selKey] || (lk==='bg'?'#0D1B2A':lk==='accent'?'#5BC8F5':'#FFFFFF');
    updateTrigger(key, cid, sel);
    PALETTES[lk].forEach(col => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (col===sel?' selected':'');
      sw.style.background = col;
      sw.title = col;
      sw.addEventListener('click', () => {
        grid.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected');
        editorState[selKey] = col;
        updateTrigger(key, cid, col);
        closeAllPopovers();
        renderAllPreviews();
      });
      grid.appendChild(sw);
    });
  });
}

function updateTrigger(key, cid, col) {
  const sw = document.getElementById('sw'+key+'_'+cid);
  const lb = document.getElementById('lbl'+key+'_'+cid);
  if(sw) sw.style.background = col;
  if(lb) lb.textContent = 'Couleur sélectionnée';
}

function updateTriggerLabel(key, cid, text) {
  const lb = document.getElementById('lbl'+key+'_'+cid);
  if(lb) lb.textContent = text;
}

function togglePopover(key, cid) {
  const pop = document.getElementById('pop'+key+'_'+cid);
  const trig = document.getElementById('trig'+key+'_'+cid);
  if(!pop) return;
  const isOpen = pop.classList.contains('open');
  closeAllPopovers();
  if(!isOpen) {
    pop.classList.add('open');
    trig.classList.add('open');
  }
}

function closeAllPopovers() {
  document.querySelectorAll('.color-popover.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.color-trigger.open').forEach(t => t.classList.remove('open'));
}

// ═══════════════════════════════════════════════════════
function syncField(field, cid) {
  const el = document.getElementById(field+'_'+cid);
  if(el) editorState[field] = el.value;
  renderAllPreviews();
}

function syncTT(cid) {
  const val = document.getElementById('trainType_'+cid)?.value;
  editorState.trainType = val;
  document.getElementById('customRow_'+cid).style.display = val==='custom'?'grid':'none';
  renderAllPreviews();
}

function populateForm(cid, p) {
  const fields = ['carrier','trainNumber','origin','destination','tripDate',
    'departure','arrival','lastName','firstName','carriage','seat','tariff'];
  fields.forEach(f => {
    const el = document.getElementById(f+'_'+cid);
    if(el) el.value = p[f] || '';
  });
  const ttEl = document.getElementById('trainType_'+cid);
  if(ttEl) { ttEl.value = p.trainType||'TER'; syncTT(cid); }
  const ctEl = document.getElementById('customTrain_'+cid);
  if(ctEl) ctEl.value = p.customTrain||'';
  const clEl = document.getElementById('classType_'+cid);
  if(clEl) clEl.value = p.classType||'';
  // QR
  if(p.qrSrc) {
    document.getElementById('qrThumb_'+cid).src = p.qrSrc;
    document.getElementById('qrZone_'+cid).classList.add('has-img');
  }
  // Logo
  if(p.logoSrc) {
    document.getElementById('logoThumb_'+cid).src = p.logoSrc;
    document.getElementById('logoZone_'+cid).classList.add('has-logo');
    document.getElementById('logoTxt_'+cid).textContent = 'Logo chargé';
    document.getElementById('logoRemoveBtn_'+cid).style.display = 'block';
  }
  // Colors
  ['Bg','Accent','Text'].forEach(key => {
    const col = p['sel'+key];
    if(!col) return;
    const grid = document.getElementById('grid'+key+'_'+cid);
    if(grid) grid.querySelectorAll('.color-swatch').forEach(sw => {
      sw.classList.toggle('selected', sw.title === col);
    });
    updateTrigger(key, cid, col);
  });
}

// ═══════════════════════════════════════════════════════
//  WALLET STACK RENDERING
// ═══════════════════════════════════════════════════════
// Chaque carte montre PEEK_H px de son haut sous la carte du dessus.
// La carte i=0 est au sommet (premier plan), les suivantes s'empilent en dessous.
// Le stack-inner est assez haut pour contenir toutes les cartes avec scroll si besoin.

const PEEK_H = 64; // px visibles du haut de chaque carte suivante

function renderStack() {
  const inner = document.getElementById('stackInner');
  if(!inner) return;

  if(!passes.length) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('passesStack').style.display = 'none';
    document.getElementById('manageBar').style.display = 'none';
    document.getElementById('passCountLabel').textContent = 'Aucun pass enregistré';
    inner.innerHTML = '';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('passesStack').style.display = 'block';
  document.getElementById('manageBar').style.display = 'flex';
  document.getElementById('passCountLabel').textContent =
    passes.length === 1 ? '1 pass enregistré' : passes.length + ' pass enregistrés';

  inner.innerHTML = '';

  const total = passes.length;
  // Estimated card height for layout purposes
  const CARD_H = 520;

  // Total scroll height: first card full + each extra card contributes PEEK_H
  inner.style.height = (CARD_H + (total - 1) * PEEK_H) + 'px';

  passes.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'pass-card-wrap' + (editMode ? ' edit-mode' : '');
    wrap.id = 'card_' + p.id;
    // Stagger animation
    wrap.style.animationDelay = (i * 60) + 'ms';

    // i=0 → top:0 (premier plan, z le plus élevé)
    // i=1 → top: CARD_H - PEEK_H  (son haut dépasse de PEEK_H sous la carte 0)
    // i=2 → top: CARD_H - PEEK_H + PEEK_H = CARD_H  etc.
    // Simplifié : top(i) = i===0 ? 0 : CARD_H - PEEK_H + (i-1)*PEEK_H = CARD_H + (i-1)*PEEK_H - PEEK_H
    // = CARD_H - PEEK_H*(2-i) ... non.
    // Logique : la carte 0 occupe [0, CARD_H].
    // La carte 1 doit avoir son TOP à (CARD_H - PEEK_H) pour que PEEK_H px soient visibles.
    // La carte 2 doit avoir son TOP à (CARD_H - PEEK_H + PEEK_H) = CARD_H.
    // => top(i) = i===0 ? 0 : (CARD_H - PEEK_H) + (i-1)*PEEK_H
    const topPos = (total - 1 - i) * PEEK_H;
    wrap.style.top = topPos + 'px';
    wrap.style.zIndex = (total - i) + 10; // i=0 → z max

    const passDiv = document.createElement('div');
    passDiv.className = 'wallet-pass';
    passDiv.style.background = p.selBg;
    passDiv.style.color = p.selText;
    passDiv.innerHTML = passHTML(p);

    if(i === 0) {
      passDiv.style.cursor = 'pointer';
      passDiv.addEventListener('click', () => { if(!editMode) openScan(p); });
    }

    const editBtn = document.createElement('button');
    editBtn.style.cssText = 'position:absolute;top:8px;left:8px;z-index:10;background:rgba(91,200,245,.85);color:#0D1B2A;border:none;border-radius:50%;width:26px;height:26px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;';
    editBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 1.5L11.5 4.5L4 12H1V9L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>';
    editBtn.addEventListener('click', (e) => { e.stopPropagation(); editPass(p.id); });
    if(editMode) editBtn.style.display = 'flex';
    wrap.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'pass-delete-btn';
    delBtn.innerHTML = '×';
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deletePass(p.id); });
    wrap.appendChild(delBtn);

    wrap.appendChild(passDiv);
    inner.appendChild(wrap);

    // Cartes i>0 : tap sur la bande visible = amener au premier plan
    if(i > 0) {
      wrap.addEventListener('click', () => {
        if(editMode) return;
        const idx = passes.findIndex(x => x.id === p.id);
        if(idx > 0) {
          const moved = passes.splice(idx, 1)[0];
          passes.unshift(moved);
          renderStack();
        }
      });
    }
  });

  const hint = document.getElementById('stackHint');
  if(hint) {
    hint.textContent = passes.length === 1
      ? "Appuie sur le pass pour l'afficher"
      : "Appuie sur une carte en dessous pour la sélectionner";
  }
}

function openScan(p) {
  const overlay = document.getElementById('scanOverlay');
  const op = document.getElementById('overlayPass');
  op.style.background = p.selBg;
  op.style.color = p.selText;
  op.innerHTML = passHTML(p);
  overlayScanActive = false;
  overlay.classList.add('active');
  document.getElementById('overlayHint').innerHTML =
    '<div class="sdot"></div> Appuie pour activer le mode scan';
  // WakeLock
  if('wakeLock' in navigator) navigator.wakeLock.request('screen').then(wl => wakeLock=wl).catch(()=>{});
}

function closeScan() {
  document.getElementById('scanOverlay').classList.remove('active');
  document.getElementById('overlayPass').classList.remove('scanning');
  overlayScanActive = false;
  if(wakeLock) { wakeLock.release(); wakeLock=null; }
}

async function toggleOverlayScan() {
  overlayScanActive = !overlayScanActive;
  const op = document.getElementById('overlayPass');
  const hint = document.getElementById('overlayHint');
  if(overlayScanActive) {
    op.classList.add('scanning');
    hint.innerHTML = '<div class="sdot" style="background:#ff6b6b;animation:pulse 2s infinite"></div> Appuie pour quitter le mode scan';
    if(screen&&'brightness' in screen) { try{ await screen.brightness.set(1.0); }catch(e){} }
  } else {
    op.classList.remove('scanning');
    hint.innerHTML = '<div class="sdot"></div> Appuie pour activer le mode scan';
    if(screen&&'brightness' in screen) { try{ await screen.brightness.set(0.5); }catch(e){} }
  }
}

async function desktopToggleScan() {
  desktopScanActive = !desktopScanActive;
  const dp = document.getElementById('desktopPass');
  const hint = document.getElementById('desktopScanHint');
  if(desktopScanActive) {
    dp.classList.add('scanning');
    hint.innerHTML = '<div class="sdot" style="background:#ff6b6b;animation:pulse 2s infinite"></div> Clique pour quitter le mode scan';
    if('wakeLock' in navigator) { try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
  } else {
    dp.classList.remove('scanning');
    hint.innerHTML = '<div class="sdot"></div> Clique sur le pass pour le mode scan';

}

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(tab === 'wallet') {
    document.getElementById('viewWallet').classList.add('active');
    document.getElementById('tabWallet').classList.add('active');
    renderStack();
  } else {
    document.getElementById('viewEditor').classList.add('active');

  }
}

// ═══════════════════════════════════════════════════════
//  NEW / EDIT / DELETE PASS
// ═══════════════════════════════════════════════════════
function newPass() {
  if(passes.length >= 10) {
    alert('Maximum 10 pass — supprime un pass existant pour en créer un nouveau.');
    return;
  }
  currentEditId = null;
  editorState = defaultPass();
  buildFormHTML('mobEditorScroll', 'savePassMob()');
  document.getElementById('editorMobTitle').textContent = 'Nouveau pass';
  document.getElementById('editorPassCount').textContent = passes.length + '/10';
  renderAllPreviews();
  switchTab('editor');
}

function editPass(id) {
  const p = passes.find(x => x.id === id);
  if(!p) return;
  currentEditId = id;
  editorState = {...p};
  buildFormHTML('mobEditorScroll', 'savePassMob()');
  populateForm('mobEditorScroll', p);
  document.getElementById('editorMobTitle').textContent = 'Modifier le pass';
  document.getElementById('editorPassCount').textContent = passes.length + '/10';
  renderAllPreviews();
  switchTab('editor');
}

function deletePass(id) {
  passes = passes.filter(x => x.id !== id);
  savePasses();
  renderStack();
  if(!passes.length) { editMode = false; document.getElementById('manageBtnToggle').textContent = 'Gérer'; }
}

function passName(p) {
  if(p.origin && p.destination) return `${p.origin} → ${p.destination}`;
  if(p.lastName) return p.lastName;
  return 'Pass sans titre';
}

// ═══════════════════════════════════════════════════════
//  SAVE (mobile)
// ═══════════════════════════════════════════════════════
function savePassMob() {
  editorState.name = passName(editorState);
  if(currentEditId !== null) {
    const idx = passes.findIndex(x => x.id === currentEditId);
    if(idx >= 0) passes[idx] = {...editorState, id: currentEditId};
  } else {
    editorState.id = Date.now();
    passes.push({...editorState});
  }
  savePasses();
  const btn = document.querySelector('#mobEditorScroll .save-btn');
  if(btn) { btn.textContent='✓ Sauvegardé !'; setTimeout(()=>{ btn.textContent='💾 Enregistrer ce pass'; switchTab('wallet'); }, 900); }
}

// Desktop save
function savePassDesktop() {
  editorState.name = passName(editorState);
  // update or add
  if(currentEditId !== null) {
    const idx = passes.findIndex(x => x.id === currentEditId);
    if(idx >= 0) passes[idx] = {...editorState, id: currentEditId};
  } else {
    if(passes.length >= 10) { alert('Maximum 10 pass.'); return; }
    editorState.id = Date.now();
    passes.push({...editorState});
    currentEditId = editorState.id;
  }
  savePasses();
  const btn = document.querySelector('#desktopEditorScroll .save-btn');
  if(btn) { btn.textContent='✓ Sauvegardé !'; setTimeout(()=>btn.textContent='💾 Enregistrer ce pass', 1600); }
}

function handleQR(e, cid) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    editorState.qrSrc = ev.target.result;
    document.getElementById('qrThumb_'+cid).src = editorState.qrSrc;
    document.getElementById('qrZone_'+cid).classList.add('has-img');
    renderAllPreviews();
  };
  r.readAsDataURL(f);
}
function handleLogo(e, cid) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    editorState.logoSrc = ev.target.result;
    document.getElementById('logoThumb_'+cid).src = editorState.logoSrc;
    document.getElementById('logoZone_'+cid).classList.add('has-logo');
    document.getElementById('logoTxt_'+cid).textContent = f.name;
    document.getElementById('logoRemoveBtn_'+cid).style.display = 'block';
    renderAllPreviews();
  };
  r.readAsDataURL(f);
}
function removeLogo(cid) {
  editorState.logoSrc = '';
  document.getElementById('logoThumb_'+cid).src='';
  document.getElementById('logoZone_'+cid).classList.remove('has-logo');
  document.getElementById('logoTxt_'+cid).textContent='Importer un logo · PNG, SVG';
  document.getElementById('logoRemoveBtn_'+cid).style.display='none';
  renderAllPreviews();
}

// ═══════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════
function savePasses() {
  localStorage.setItem('monpass_v4', JSON.stringify(passes));
}
function loadPasses() {
  try {
    const raw = localStorage.getItem('monpass_v4');
    if(raw) passes = JSON.parse(raw);
    // migrate old single-pass format
    const oldRaw = localStorage.getItem('monpass_v3');
    if(!passes.length && oldRaw) {
      const old = JSON.parse(oldRaw);
      old.id = old.id || Date.now();
      old.name = passName(old);
      passes = [old];
      savePasses();
    }
  } catch(e) { passes = []; }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  loadPasses();

  // Desktop: build form + render preview
  buildFormHTML('desktopEditorScroll', 'savePassDesktop()');
  // If existing passes, load first into editor state for desktop
  if(passes.length) {
    editorState = {...passes[0]};
    currentEditId = passes[0].id;
    populateForm('desktopEditorScroll', editorState);
  }
  renderAllPreviews();

  // Mobile: render stack
  renderStack();

  // PWA
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); window._dpi=e; });
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
}

init();

// ═══════════════════════════════════════════════════════
//  DATE + TIME PICKERS
// ═══════════════════════════════════════════════════════

// Close all pickers + color popovers on outside tap
document.addEventListener('click', e => {
  if(!e.target.closest('.picker-wrap') && !e.target.closest('.color-picker-wrap')) {
    closeAllPopovers();
    closeAllPickers();
  }
});

function closeAllPickers() {
  document.querySelectorAll('.picker-popover.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.date-trigger.open, .time-trigger.open').forEach(t => t.classList.remove('open'));
}

// ── CALENDAR ──
const CAL_MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CAL_DAYS_FR = ['Lu','Ma','Me','Je','Ve','Sa','Di'];

function initCalendar(cid) {
  const now = new Date();
  let viewY = now.getFullYear(), viewM = now.getMonth();
  let selDay = null, selM = null, selY = null;

  // Parse existing value
  const existingVal = editorState.tripDate || '';
  if(existingVal && existingVal.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
    const [d,m,y] = existingVal.split('/');
    selDay = parseInt(d); selM = parseInt(m)-1; selY = parseInt(y);
    viewM = selM; viewY = selY;
    document.getElementById('dateVal_'+cid).textContent = existingVal;
  }

  function renderCal() {
    document.getElementById('calLabel_'+cid).textContent = CAL_MONTHS_FR[viewM] + ' ' + viewY;
    const grid = document.getElementById('calGrid_'+cid);
    grid.innerHTML = '';
    CAL_DAYS_FR.forEach(d => {
      const dn = document.createElement('div');
      dn.className = 'cal-day-name'; dn.textContent = d;
      grid.appendChild(dn);
    });
    const first = new Date(viewY, viewM, 1);
    // Monday-based: 0=Mon,6=Sun
    let startDow = (first.getDay() + 6) % 7;
    // Prev month padding
    const prevDays = new Date(viewY, viewM, 0).getDate();
    for(let i=0;i<startDow;i++){
      const el=document.createElement('div');
      el.className='cal-day other-month';
      el.textContent=prevDays-startDow+1+i;
      grid.appendChild(el);
    }
    const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
    const todayD=now.getDate(),todayM=now.getMonth(),todayY=now.getFullYear();
    for(let d=1;d<=daysInMonth;d++){
      const el=document.createElement('div');
      el.className='cal-day';
      if(d===todayD&&viewM===todayM&&viewY===todayY) el.classList.add('today');
      if(selDay===d&&selM===viewM&&selY===viewY) el.classList.add('selected');
      el.textContent=d;
      el.addEventListener('click', () => {
        selDay=d; selM=viewM; selY=viewY;
        const ds=String(d).padStart(2,'0');
        const ms=String(viewM+1).padStart(2,'0');
        const fmt=ds+'/'+ms+'/'+viewY;
        editorState.tripDate=fmt;
        document.getElementById('dateVal_'+cid).textContent=fmt;
        syncField('tripDate', cid);
        // Visual feedback before close
        renderCal();
        setTimeout(()=>closeAllPickers(), 180);
      });
      grid.appendChild(el);
    }
    // Fill rest
    const filled = startDow+daysInMonth;
    const remaining = filled % 7 === 0 ? 0 : 7 - (filled%7);
    for(let i=1;i<=remaining;i++){
      const el=document.createElement('div');
      el.className='cal-day other-month'; el.textContent=i;
      grid.appendChild(el);
    }
  }

  document.getElementById('calPrev_'+cid).addEventListener('click', e => {
    e.stopPropagation();
    viewM--; if(viewM<0){viewM=11;viewY--;}
    renderCal();
  });
  document.getElementById('calNext_'+cid).addEventListener('click', e => {
    e.stopPropagation();
    viewM++; if(viewM>11){viewM=0;viewY++;}
    renderCal();
  });

  const trig = document.getElementById('dateTrig_'+cid);
  trig.addEventListener('click', () => {
    const pop = document.getElementById('datePop_'+cid);
    const isOpen = pop.classList.contains('open');
    closeAllPickers(); closeAllPopovers();
    if(!isOpen){ pop.classList.add('open'); trig.classList.add('open'); renderCal(); }
  });
}

// ── TIME DRUM ──
function initTimeDrum(prefix, cid, onConfirm) {
  const HOURS   = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
  const MINUTES = Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));

  function buildDrum(drumId, innerId, items, initIdx) {
    const inner = document.getElementById(innerId);
    // Triple the items for infinite-feel scroll
    inner.innerHTML = '';
    const ITEM_H = 40;
    // We need padding top/bottom = 2 items
    const PAD = 2;

    // Build: PAD empties + items + PAD empties
    const buildSet = () => items.map(v => {
      const el=document.createElement('div');
      el.className='drum-item'; el.textContent=v; return el;
    });
    // Add paddings
    for(let i=0;i<PAD;i++){
      const el=document.createElement('div');
      el.className='drum-item'; el.textContent=''; inner.appendChild(el);
    }
    buildSet().forEach(el=>inner.appendChild(el));
    for(let i=0;i<PAD;i++){
      const el=document.createElement('div');
      el.className='drum-item'; el.textContent=''; inner.appendChild(el);
    }

    let currentIdx = initIdx;

    function setIndex(idx, animate=true) {
      currentIdx = ((idx % items.length) + items.length) % items.length;
      const offset = -(currentIdx * ITEM_H) - (ITEM_H / 2);
      inner.style.transition = animate ? 'transform .18s cubic-bezier(.25,.46,.45,.94)' : 'none';
      inner.style.transform = 'translateY(' + offset + 'px)';
      // Update active
      const allItems = inner.querySelectorAll('.drum-item');
      allItems.forEach((el,i)=>{
        el.classList.toggle('active', i === currentIdx+PAD);
      });
    }
    setIndex(initIdx, false);

    // Touch/mouse drag
    let startY=0, startIdx=0, dragging=false;
    const drum = document.getElementById(drumId);

    function onStart(y){startY=y;startIdx=currentIdx;dragging=true;}
    function onMove(y){
      if(!dragging)return;
      const delta=Math.round((startY-y)/ITEM_H);
      setIndex(startIdx+delta);
    }
    function onEnd(){dragging=false;}

    drum.addEventListener('touchstart',e=>{onStart(e.touches[0].clientY);},{passive:true});
    drum.addEventListener('touchmove',e=>{onMove(e.touches[0].clientY);},{passive:true});
    drum.addEventListener('touchend',onEnd);
    drum.addEventListener('mousedown',e=>{onStart(e.clientY);});
    drum.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientY);});
    drum.addEventListener('mouseup',onEnd);
    drum.addEventListener('mouseleave',onEnd);

    // Click items
    inner.querySelectorAll('.drum-item').forEach((el,i)=>{
      el.addEventListener('click',()=>setIndex(i-PAD));
    });

    return { getValue:()=>items[currentIdx], setIdx:setIndex };
  }

  // Parse existing time
  const existingTime = prefix==='dep' ? (editorState.departure||'') : (editorState.arrival||'');
  let initH=8, initM=0;
  if(existingTime.match(/^\d{2}:\d{2}$/)){
    const [h,m]=existingTime.split(':');
    initH=parseInt(h); initM=parseInt(m);
  }
  const valEl   = document.getElementById(prefix+'Val_'+cid);
  if(existingTime) valEl.textContent = existingTime;

  const drumH = buildDrum(prefix+'DrumH_'+cid, prefix+'DrumHInner_'+cid, HOURS, initH);
  const drumM = buildDrum(prefix+'DrumM_'+cid, prefix+'DrumMInner_'+cid, MINUTES, initM);

  const trig = document.getElementById(prefix+'Trig_'+cid);
  trig.addEventListener('click', () => {
    const pop = document.getElementById(prefix+'Pop_'+cid);
    const isOpen = pop.classList.contains('open');
    closeAllPickers(); closeAllPopovers();
    if(!isOpen){ pop.classList.add('open'); trig.classList.add('open'); }
  });

  document.getElementById(prefix+'Confirm_'+cid).addEventListener('click', e => {
    e.stopPropagation();
    const val = drumH.getValue() + ':' + drumM.getValue();
    valEl.textContent = val;
    onConfirm(val);
    closeAllPickers();
  });
}

function initPickers(cid) {
  initCalendar(cid);
  initTimeDrum('dep', cid, (val) => {
    editorState.departure = val;
    renderAllPreviews();
  });
  initTimeDrum('arr', cid, (val) => {
    editorState.arrival = val;
    renderAllPreviews();
  });
  // Popover arrivée dans colonne droite : aligner à droite pour ne pas dépasser
  const arrPop = document.getElementById('arrPop_'+cid);
  if(arrPop) arrPop.classList.add('pop-right');
}
